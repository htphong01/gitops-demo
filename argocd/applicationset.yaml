# applicationset.yaml
# Defines ArgoCD ApplicationSets to automate app deployments across three environments.
# Split into two ApplicationSets in one file to separate Auto Sync (local/dev/staging) and Manual Sync (prod) behaviors.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: api-gateway-auto-sync
  namespace: argocd
spec:
  # List Generator targeting environments that undergo automated synchronization
  generators:
    - list:
        elements:
          - env: local
            url: https://kubernetes.default.svc
          - env: dev
            url: https://kubernetes.default.svc
          - env: staging
            url: https://kubernetes.default.svc
  template:
    metadata:
      name: 'api-gateway-{{env}}'
    spec:
      project: default
      source:
        # Update this URL to point to your actual GitOps Git repository
        repoURL: 'https://github.com/mycompany/gitops.git'
        targetRevision: HEAD
        path: 'k8s/overlays/{{env}}'
      destination:
        server: '{{url}}'
        namespace: 'api-gateway-{{env}}'
      syncPolicy:
        # Enables automated synchronization for local, dev, and staging overlays
        automated:
          prune: true       # Automatically deletes resources in the cluster if removed from Git
          selfHeal: true    # Automatically overwrites manual out-of-band changes (prevents configuration drift)
        syncOptions:
          - CreateNamespace=true # Dynamically creates namespace if missing
        # Production Best Practice: Add retry policy for transient network/sync failures
        retry:
          limit: 3          # Try syncing 3 times before declaring failure
          backoff:
            duration: 5s    # Initial wait duration of 5 seconds
            maxDuration: 3m # Cap the wait duration at 3 minutes
            factor: 2       # Double the wait duration on each retry (5s, 10s, 20s...)
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: api-gateway-manual-sync
  namespace: argocd
spec:
  # Generator targeting environments requiring manual approvals (Production)
  generators:
    - list:
        elements:
          - env: prod
            url: https://kubernetes.default.svc
  template:
    metadata:
      name: 'api-gateway-{{env}}'
    spec:
      project: default
      source:
        repoURL: 'https://github.com/mycompany/gitops.git'
        targetRevision: HEAD
        path: 'k8s/overlays/{{env}}'
      destination:
        server: '{{url}}'
        namespace: 'api-gateway-{{env}}'
      # Production syncPolicy intentionally omits the 'automated' block to disable auto-sync
      # Changes in Git mark the App as "OutOfSync" in ArgoCD and wait for manual approval and Sync trigger.
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
        # Production Best Practice: Configured retry policy for manual sync executions
        retry:
          limit: 3          # Try syncing 3 times before declaring failure
          backoff:
            duration: 5s    # Initial wait duration
            maxDuration: 3m # Max wait duration
            factor: 2       # Exponential backoff multiplier
