# secret-sealed.yaml (Dev)
# Demo Sealed Secret: One-way encrypted secret safe to store in git repository.
# When deployed, the in-cluster Sealed Secrets Controller will automatically decrypt it to a standard K8s Secret.
#
# CRITICAL KUSTOMIZE GOTCHA:
# Kustomize's 'namespace' configuration at the overlay level does NOT automatically override the namespace 
# inside Custom Resources (CRDs) like SealedSecret. Therefore, we explicitly declare the namespace 'api-gateway-dev' 
# to match the environment.

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: api-gateway-secret
  namespace: api-gateway-dev
spec:
  encryptedData:
    API_KEY: AgB3V2G4T7yP8qM9Z1x5bHjK2LmNoPqRsTuVwXyZ0aBcDeFgHiJkLmNoPqRsTuVwXyZ==
  template:
    metadata:
      name: api-gateway-secret
      labels:
        app: api-gateway
    type: Opaque
