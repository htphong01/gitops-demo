# secret-sealed.yaml (Prod)
# Sealed Secret configuration for Production environment.
#
# CRITICAL KUSTOMIZE GOTCHA:
# Kustomize's 'namespace' configuration at the overlay level does NOT automatically override the namespace 
# inside Custom Resources (CRDs) like SealedSecret. Therefore, we explicitly declare the namespace 'api-gateway-prod' 
# to match the environment.

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: api-gateway-secret
  namespace: api-gateway-prod
spec:
  encryptedData:
    API_KEY: AgB3V2G4T7yP8qM9Z1x5bHjK2LmNoPqRsTuVwXyZ0aBcDeFgHiJkLmNoPqRsTuVwXyZPRODUCTION==
  template:
    metadata:
      name: api-gateway-secret
      labels:
        app: api-gateway
    type: Opaque
