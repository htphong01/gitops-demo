# secret-sealed.yaml (Local)
# Pre-encrypted SealedSecret for local development.
# Decrypted in-cluster using the pre-imported key 'local-sealed-secret-key'.

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: api-gateway-secret
  namespace: api-gateway-local
spec:
  encryptedData:
    API_KEY: 
  template:
    metadata:
      name: api-gateway-secret
      labels:
        app: api-gateway
    type: Opaque
