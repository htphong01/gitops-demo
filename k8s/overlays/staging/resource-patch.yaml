# resource-patch.yaml (Staging)
# Configures moderate CPU/Memory limits to mimic production resources in Staging.
# Set slightly higher than base (100m/128Mi requests, 200m/256Mi limits) to verify resource override.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  template:
    spec:
      containers:
        - name: api-gateway
          resources:
            requests:
              cpu: 150m
              memory: 192Mi
            limits:
              cpu: 300m
              memory: 384Mi
