# service.yaml (Base)
# Declares the Kubernetes Service to expose the api-gateway pods inside the cluster.

apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  # Internal cluster communication type
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: api-gateway
