# kustomization.yaml (Base)
# Aggregates and manages all core baseline resources shared across environments.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Standardized labels automatically propagated to all generated resources
commonLabels:
  app.kubernetes.io/name: api-gateway
  app.kubernetes.io/managed-by: kustomize

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
